<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>ce-watch // security console</title>
<style>
  :root {
    --bg: #07090d;
    --panel: #0c1119;
    --panel-2: #0f1623;
    --line: #1b2436;
    --ink: #c8d4e3;
    --ink-dim: #6b7a90;
    --accent: #2bd4a8;
    --red: #ff3b5c;
    --amber: #ffb02e;
    --blue: #4aa8ff;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(43,212,168,0.07), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,59,92,0.06), transparent 55%),
      var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    position: sticky; top: 0; z-index: 5;
    backdrop-filter: blur(6px);
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand b { color: #fff; letter-spacing: 2px; font-weight: 700; }
  .brand span { color: var(--ink-dim); letter-spacing: 3px; text-transform: uppercase; font-size: 10px; }
  .pulse {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px var(--accent);
    animation: pulse 2.2s infinite ease-in-out;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .spacer { flex: 1; }
  .unseen {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--panel);
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #2a3346;
  }
  .dot.hot { background: var(--red); box-shadow: 0 0 12px var(--red); animation: pulse 1.2s infinite; }
  button {
    font-family: var(--mono); font-size: 12px;
    color: var(--ink); background: var(--panel-2);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 7px 12px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); color: #fff; }
  button.danger:hover { border-color: var(--red); }
  .bar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    padding: 12px 20px; border-bottom: 1px solid var(--line);
  }
  select, input {
    font-family: var(--mono); font-size: 12px;
    color: var(--ink); background: var(--panel);
    border: 1px solid var(--line); border-radius: 6px; padding: 6px 9px;
  }
  label { color: var(--ink-dim); text-transform: uppercase; font-size: 10px; letter-spacing: 1px; margin-right: 4px; }
  .stats { display: flex; gap: 18px; color: var(--ink-dim); }
  .stats b { color: var(--ink); }
  main { padding: 0 20px 60px; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  thead th {
    text-align: left; position: sticky; top: 56px; z-index: 2;
    color: var(--ink-dim); font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; font-size: 10px;
    padding: 10px 10px; border-bottom: 1px solid var(--line);
    background: var(--bg);
  }
  tbody td { padding: 9px 10px; border-bottom: 1px solid rgba(27,36,54,0.6); vertical-align: top; }
  tbody tr:hover { background: rgba(74,168,255,0.05); }
  tr.fresh { animation: flash 1.6s ease-out; }
  @keyframes flash { from { background: rgba(43,212,168,0.16); } to { background: transparent; } }
  .mono { font-family: var(--mono); }
  .nid { color: var(--blue); word-break: break-all; }
  .ip { color: var(--ink-dim); }
  .reason { color: var(--ink); }
  .when { color: var(--ink-dim); white-space: nowrap; }
  .sev { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; border: 1px solid; }
  .sev.low { color: var(--blue); border-color: rgba(74,168,255,0.4); }
  .sev.med { color: var(--amber); border-color: rgba(255,176,46,0.4); }
  .sev.high { color: var(--red); border-color: rgba(255,59,92,0.5); background: rgba(255,59,92,0.08); }
  .heur { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
    color: var(--accent); border: 1px solid rgba(43,212,168,0.35); }
  .sample { color: var(--ink-dim); font-size: 11px; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { color: var(--ink-dim); text-align: center; padding: 60px; }
  .gate { max-width: 520px; margin: 12vh auto; padding: 28px; border: 1px solid var(--line);
    border-radius: 10px; background: var(--panel); }
  .gate h1 { font-size: 15px; letter-spacing: 2px; color: #fff; }
  .gate p { color: var(--ink-dim); line-height: 1.6; }
  .gate input { width: 100%; margin: 12px 0; padding: 10px; }
  .err { color: var(--red); min-height: 16px; }
  .enroll { margin-top: 18px; padding: 14px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--panel-2); }
  .enroll .lbl { color: var(--ink-dim); text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
  .enroll code { display: block; margin: 6px 0 14px; padding: 8px 10px; border-radius: 6px;
    background: #060810; color: var(--accent); word-break: break-all; border: 1px solid var(--line); }
  .enroll code.copy { cursor: pointer; }
  .enroll code.copy:hover { border-color: var(--accent); }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ce-watch admin auth — ce-secrets challenge-response, inlined WebCrypto (byte-exact with the
// canonical crypto.mjs / auth.mjs and the Rust SDK). The operator's device key lives in
// localStorage; on first load we show the deviceId + compact public key so they can enroll it ONCE
// into CE_WATCH_ADMIN_DEVICES at deploy. No token prompt, ever.
const LS_DEVICE = "ce-watch-device-key";
const AUD = "ce-watch";
const subtle = globalThis.crypto.subtle;
let device = null;   // { ecdhPriv, ecdhPub, ecdsaPriv, ecdsaPub, id }
let lastHead = 0;
let rows = [];

// ---- encoding (mirror crypto.mjs b64/hex exactly) ----
const b64u = {
  enc(buf) { const b = buf instanceof Uint8Array ? buf : new Uint8Array(buf); let s = "";
    for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
    return btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, ""); },
  dec(str) { const s = str.replace(/-/g, "+").replace(/_/g, "/");
    const bin = atob(s + "===".slice((s.length + 3) % 4));
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i); return out; },
};
const hexenc = (buf) => [...(buf instanceof Uint8Array ? buf : new Uint8Array(buf))]
  .map((x) => x.toString(16).padStart(2, "0")).join("");
const utf8 = (s) => new TextEncoder().encode(s);
// trap #5: top-level keys sorted, no whitespace — identical bytes to the Rust verifier.
const stableStringify = (o) => JSON.stringify(o, Object.keys(o).sort());

// ---- device key: ECDH + ECDSA P-256, JWK-serialized, deviceId = hex(sha256([x,y,x,y]))[..16] ----
async function deviceIdOf(ecdhPub, ecdsaPub) {
  const data = utf8(JSON.stringify([ecdhPub.x, ecdhPub.y, ecdsaPub.x, ecdsaPub.y]));
  return hexenc(new Uint8Array(await subtle.digest("SHA-256", data))).slice(0, 16);
}
async function generateDevice() {
  const ecdh = await subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveBits"]);
  const ecdsa = await subtle.generateKey({ name: "ECDSA", namedCurve: "P-256" }, true, ["sign", "verify"]);
  const dk = {
    ecdhPriv: await subtle.exportKey("jwk", ecdh.privateKey),
    ecdhPub: await subtle.exportKey("jwk", ecdh.publicKey),
    ecdsaPriv: await subtle.exportKey("jwk", ecdsa.privateKey),
    ecdsaPub: await subtle.exportKey("jwk", ecdsa.publicKey),
  };
  dk.id = await deviceIdOf(dk.ecdhPub, dk.ecdsaPub);
  return dk;
}
async function loadOrCreateDevice() {
  const saved = localStorage.getItem(LS_DEVICE);
  if (saved) { try { return JSON.parse(saved); } catch (e) {} }
  const dk = await generateDevice();
  localStorage.setItem(LS_DEVICE, JSON.stringify(dk));
  return dk;
}
// The compact deploy string the operator enrolls: b64url(04 || ecdsaPub.x || ecdsaPub.y).
function compactPub(dk) {
  const x = b64u.dec(dk.ecdsaPub.x), y = b64u.dec(dk.ecdsaPub.y);
  const raw = new Uint8Array(65); raw[0] = 0x04; raw.set(x, 1); raw.set(y, 33);
  return b64u.enc(raw);
}
// Sign the flat canonical body { aud, deviceId, nonce, ts } -> base64url(raw P1363 64-byte sig).
async function signChallenge(dk, aud, nonce, ts) {
  const priv = await subtle.importKey("jwk", dk.ecdsaPriv, { name: "ECDSA", namedCurve: "P-256" }, false, ["sign"]);
  const body = { aud: String(aud), deviceId: String(dk.id), nonce: String(nonce), ts: String(ts) };
  const data = utf8(stableStringify(body));
  // WebCrypto ECDSA emits raw IEEE-P1363 r||s (trap #3) — exactly what the Rust SDK expects.
  const sig = new Uint8Array(await subtle.sign({ name: "ECDSA", hash: "SHA-256" }, priv, data));
  return b64u.enc(sig); // base64url no-pad (trap #4)
}

function h(tag, attrs, kids) {
  const e = document.createElement(tag);
  for (const k in (attrs||{})) {
    if (k === "class") e.className = attrs[k];
    else if (k === "html") e.innerHTML = attrs[k];
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of (kids||[])) e.append(c.nodeType ? c : document.createTextNode(c));
  return e;
}

// The "not yet enrolled / locked" screen. Shows the operator THIS device's id + public key so they
// paste it once into CE_WATCH_ADMIN_DEVICES at deploy. No token entry — possession of the device key
// (held in localStorage) is the credential.
function gate(msg) {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const id = device ? device.id : "(generating…)";
  const pub = device ? compactPub(device) : "";
  const entry = device ? id + ":" + pub : "";
  const idCode = h("code", {}, [id]);
  const entryCode = h("code", { class: "copy", title: "click to copy" }, [entry]);
  entryCode.addEventListener("click", () => {
    navigator.clipboard && navigator.clipboard.writeText(entry);
    entryCode.textContent = "copied — paste into CE_WATCH_ADMIN_DEVICES";
    setTimeout(() => { entryCode.textContent = entry; }, 1400);
  });
  app.append(h("div", { class: "gate" }, [
    h("h1", {}, ["ce-watch // restricted"]),
    h("p", {}, [
      "This browser holds a device key. To grant it access, enroll its public key ONCE in the ",
      "server's ", h("code", {}, ["CE_WATCH_ADMIN_DEVICES"]), " env (comma-separated), then redeploy. ",
      "After that, this device signs every request — no token to paste.",
    ]),
    h("div", { class: "err" }, [msg || ""]),
    h("div", { class: "enroll" }, [
      h("div", { class: "lbl" }, ["this device id"]),
      idCode,
      h("div", { class: "lbl" }, ["enroll line (deviceId:pub) — click to copy"]),
      entryCode,
    ]),
    h("button", { onclick: boot }, ["retry"]),
  ]));
}

// Attach a freshly signed challenge to a request. Fetches /admin/challenge, signs it with the device
// key, and sets the x-ce-device-id / x-ce-auth / x-ce-aud / x-ce-nonce / x-ce-ts headers.
async function api(path, opts) {
  opts = opts || {};
  const cr = await fetch("/admin/challenge");
  if (!cr.ok) throw new Error("challenge failed");
  const ch = await cr.json();
  const sig = await signChallenge(device, ch.aud, ch.nonce, ch.ts);
  opts.headers = Object.assign({}, opts.headers, {
    "x-ce-device-id": device.id,
    "x-ce-auth": sig,
    "x-ce-aud": ch.aud,
    "x-ce-nonce": ch.nonce,
    "x-ce-ts": ch.ts,
  });
  return fetch(path, opts);
}

function fmtTime(ts) {
  const d = new Date(ts * 1000);
  return d.toISOString().replace("T", " ").replace(/\.\d+Z$/, "Z");
}

function renderShell() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.append(
    h("header", {}, [
      h("div", { class: "pulse" }, []),
      h("div", { class: "brand" }, [ h("b", {}, ["CE-WATCH"]), h("span", {}, ["security console"]) ]),
      h("div", { class: "spacer" }, []),
      h("div", { class: "unseen" }, [
        h("div", { id: "dot", class: "dot" }, []),
        h("span", { id: "unseen-label", class: "ip" }, ["0 unseen"]),
      ]),
      h("button", { class: "danger", onclick: markSeen }, ["mark seen"]),
      h("button", { onclick: () => gate("") }, ["device"]),
    ]),
    h("div", { class: "bar" }, [
      h("label", {}, ["heuristic"]),
      sel("f-heur", ["", "H1","H2","H3","H4","H5","H6"]),
      h("label", {}, ["severity"]),
      sel("f-sev", ["", "low","med","high"]),
      h("label", {}, ["node"]),
      h("input", { id: "f-node", placeholder: "node_id / ip:…", oninput: () => refresh(true) }),
      h("button", { onclick: () => refresh(true) }, ["apply"]),
      h("div", { class: "spacer" }, []),
      h("div", { class: "stats" }, [
        h("span", {}, [ "total ", h("b", { id: "stat-total" }, ["0"]) ]),
        h("span", {}, [ "shown ", h("b", { id: "stat-shown" }, ["0"]) ]),
      ]),
    ]),
    h("main", {}, [
      h("table", {}, [
        h("thead", {}, [ h("tr", {}, [
          th("when"), th("who"), th("where"), th("why"), th("severity"), th("sample"),
        ]) ]),
        h("tbody", { id: "rows" }, []),
      ]),
      h("div", { id: "empty", class: "empty" }, []),
    ]),
  );
  document.getElementById("f-heur").addEventListener("change", () => refresh(true));
  document.getElementById("f-sev").addEventListener("change", () => refresh(true));
}

function th(t) { return h("th", {}, [t]); }
function sel(id, opts) {
  const s = h("select", { id });
  for (const o of opts) s.append(h("option", { value: o }, [o === "" ? "all" : o]));
  return s;
}

function markSeen() {
  api("/admin/seen", { method: "POST" }).then(updateUnseen);
}

async function updateUnseen() {
  try {
    const r = await api("/admin/unseen");
    if (!r.ok) return;
    const j = await r.json();
    const dot = document.getElementById("dot");
    const lbl = document.getElementById("unseen-label");
    if (!dot) return;
    if (j.unseen > 0) { dot.classList.add("hot"); lbl.textContent = j.unseen + " unseen"; }
    else { dot.classList.remove("hot"); lbl.textContent = "0 unseen"; }
  } catch (e) {}
}

async function refresh(replace) {
  const heur = document.getElementById("f-heur").value;
  const sev = document.getElementById("f-sev").value;
  const node = document.getElementById("f-node").value.trim();
  const qs = new URLSearchParams();
  if (heur) qs.set("heuristic", heur);
  if (sev) qs.set("severity", sev);
  if (node) qs.set("node", node);
  // When filters are active, always do a full (replace) fetch; incremental `since` only when
  // showing the unfiltered live feed.
  const filtered = heur || sev || node;
  if (!filtered && !replace && lastHead) qs.set("since", lastHead);

  let r;
  try { r = await api("/admin/flags?" + qs.toString()); }
  catch (e) { return; }
  if (r.status === 401) { gate("this device is not enrolled (or the server has no operator yet)"); return; }
  if (!r.ok) return;
  const j = await r.json();

  if (filtered || replace) { rows = j.flags; }
  else {
    // prepend new rows, mark fresh
    for (const f of j.flags) f._fresh = true;
    rows = j.flags.concat(rows).slice(0, 2000);
  }
  if (j.head) lastHead = j.head;
  drawRows();
  document.getElementById("stat-total").textContent = j.head || rows.length;
  document.getElementById("stat-shown").textContent = rows.length;
  updateUnseen();
}

function drawRows() {
  const tb = document.getElementById("rows");
  const empty = document.getElementById("empty");
  tb.innerHTML = "";
  if (!rows.length) { empty.textContent = "no flags match the current filter"; return; }
  empty.textContent = "";
  for (const f of rows) {
    const sampleStr = f.sample ? JSON.stringify(f.sample) : "";
    const tr = h("tr", { class: f._fresh ? "fresh" : "" }, [
      h("td", { class: "when" }, [fmtTime(f.ts)]),
      h("td", {}, [
        h("div", { class: "nid mono" }, [f.node_id]),
        h("div", { class: "ip" }, [f.ip]),
      ]),
      h("td", { class: "ip" }, [ where(f) ]),
      h("td", {}, [
        h("span", { class: "heur" }, [f.heuristic]),
        h("div", { class: "reason" }, [" " + f.reason]),
      ]),
      h("td", {}, [ h("span", { class: "sev " + (f.severity||"low") }, [f.severity||"low"]) ]),
      h("td", { class: "sample", title: sampleStr }, [sampleStr]),
    ]);
    tb.append(tr);
    f._fresh = false;
  }
}

function where(f) {
  const s = f.sample || {};
  return s.endpoint || s.func || s.chosen_node || s.target || "—";
}

async function boot() {
  if (!device) device = await loadOrCreateDevice();
  // Probe enrollment with a real signed request. If we are not enrolled yet, show the gate with this
  // device's id + public key so the operator can add it to CE_WATCH_ADMIN_DEVICES.
  let probe;
  try { probe = await api("/admin/unseen"); }
  catch (e) { gate("could not reach the server"); return; }
  if (probe.status === 401) { gate(""); return; }
  if (!probe.ok) { gate("server error"); return; }
  renderShell();
  refresh(true);
  if (window._ceTimer) clearInterval(window._ceTimer);
  window._ceTimer = setInterval(() => refresh(false), 4000);
}

boot();
</script>
</body>
</html>
